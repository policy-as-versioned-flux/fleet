name: sunset escalator

# Ticket 09 follow-up (real-estate epic, wave-10 skeptic finding): sunset-escalator.sh's
# logic was real and demonstrated by hand (fleet#30/#31), but nothing in the estate ever
# invoked it unattended -- ADR-0010's "on the date itself, a machine opens a retirement
# PR" was aspirational until this workflow existed. Runs daily; the script's own dedup
# logic (checks for an already-open PR/issue before creating another) makes a missed or
# re-run day harmless. Runs against this repo directly (FLEET_REPO defaults to
# github.repository) so the default GITHUB_TOKEN's same-repo permissions are enough
# for the issue-escalation path.
#
# Wave-5 skeptic finding: the retirement-PR path (script's `git push` + `gh pr create`)
# needs two things the issue path doesn't, and neither was wired up originally:
#   1. git push credentials -- the script does a fresh `git clone` to a tmp dir, which
#      bypasses actions/checkout's credential helper; `gh auth setup-git` below wires the
#      GITHUB_TOKEN into git for github.com so the push authenticates.
#   2. permission for Actions to CREATE a PR -- gated by the repo/org setting "Allow
#      GitHub Actions to create and approve pull requests" (REST: actions/permissions/
#      workflow -> can_approve_pull_request_reviews). The `permissions:` block below is
#      necessary but not sufficient; that org toggle is the remaining manual step (an
#      admin setting change, or swap GH_TOKEN for a fine-grained PAT secret). See ticket
#      09's follow-up for why that's left as an honestly-recorded operator decision.

on:
  schedule:
    - cron: "0 8 * * *" # daily 08:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no PR/issue writes)"
        type: boolean
        default: false
      sunset_override:
        description: "Override today's date (YYYY-MM-DD) to exercise the retirement-PR path; empty = real date"
        type: string
        default: ""

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  escalate:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch sunset-escalator.sh from governance-agent
        uses: actions/checkout@v4
        with:
          repository: policy-as-versioned-flux/governance-agent
          path: governance-agent

      - name: Wire the token + a bot identity into git for the script's clone/commit/push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh auth setup-git
          # The runner has no git identity, and the script commits a fresh clone -- without
          # this, `git commit` fails with "empty ident name" before the push/PR steps are even
          # reached (found the hard way by a real forced-override run, 2026-07-20). Use the
          # standard github-actions[bot] identity.
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run sunset escalator against this repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FLEET_REPO: ${{ github.repository }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          SUNSET_TODAY_OVERRIDE: ${{ inputs.sunset_override || '' }}
        run: bash governance-agent/sunset-escalator.sh
