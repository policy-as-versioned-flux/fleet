name: pr-gate

# Issue 12 (faithful-floor); ticket 03 (real-estate) -- the gate's own logic
# moved into policy-as-versioned-flux/pr-gate-action, a pinned, versioned
# component: the gate that verifies pins is itself pinned. See that repo
# for what it actually checks.
#
# No `paths:` filter on the trigger: this check is required by a branch
# ruleset, and a required check gated by `paths:` never reports any status
# on a PR that doesn't touch those paths -- GitHub then blocks the merge
# forever waiting on a check that was never going to run. Every PR runs
# this job; it no-ops (and reports success) when clusters/** wasn't
# touched, checked inside the action itself.

on:
  pull_request: {}

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: pr-gate-action (base -> head)
        uses: policy-as-versioned-flux/pr-gate-action@98939ebd5ea5df7577eee71c21c3a25a4b68f123 # v1.0.0
        with:
          base-ref: origin/${{ github.base_ref }}
          head-ref: ${{ github.event.pull_request.head.sha }}
