# The versioned dependency (ADR-0001): pinned on BOTH spec.ref.tag (human
# documentation) and spec.ref.commit (the integrity anchor Flux actually
# resolves -- commit takes precedence over tag, so a force-moved tag would
# be silently ignored, not silently pulled). Renovate's customManager (a
# later issue) is what keeps this pair in sync going forward; for this
# tracer it's hand-set to v1.0.0's resolved SHA.
#
# One Kustomization per policy (not one aggregating the whole
# workloads/kyverno/ tree): the policy repo has no top-level
# kustomization.yaml there, only one per policy directory (each with its own
# nameSuffix + version self-selector substitution, PRD §6.4) -- this avoids
# needing a new policy release just to add fleet-side plumbing.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: policy-v1-0-0
  namespace: flux-system
spec:
  interval: 1m0s
  url: https://github.com/policy-as-versioned-flux/policy
  ref:
    tag: v1.0.0
    commit: 42280cd2998976ea5b45882e28be949ff39b43e9
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: policy-v1-0-0-require-department-label
  namespace: flux-system
spec:
  interval: 1m0s
  sourceRef:
    kind: GitRepository
    name: policy-v1-0-0
  path: ./workloads/kyverno/require-department-label
  prune: true
  wait: true
  timeout: 3m0s
  dependsOn:
    - name: kyverno
  # ValidatingPolicy has no standard `.status.conditions[type=Ready]` (see
  # pavf-policy/verify-live.sh) -- kstatus's generic heuristic can't read
  # its actual readiness field, so wait:true alone risks reporting Ready as
  # soon as SSA apply succeeds, before Kyverno's webhook is really serving
  # it. "wait + CEL health checks" (CONTEXT.md) closes that race.
  healthCheckExprs:
    - apiVersion: policies.kyverno.io/v1
      kind: ValidatingPolicy
      current: status.conditionStatus.ready == true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: policy-v1-0-0-require-known-department-label
  namespace: flux-system
spec:
  interval: 1m0s
  sourceRef:
    kind: GitRepository
    name: policy-v1-0-0
  path: ./workloads/kyverno/require-known-department-label
  prune: true
  wait: true
  timeout: 3m0s
  dependsOn:
    - name: kyverno
  # ValidatingPolicy has no standard `.status.conditions[type=Ready]` (see
  # pavf-policy/verify-live.sh) -- kstatus's generic heuristic can't read
  # its actual readiness field, so wait:true alone risks reporting Ready as
  # soon as SSA apply succeeds, before Kyverno's webhook is really serving
  # it. "wait + CEL health checks" (CONTEXT.md) closes that race.
  healthCheckExprs:
    - apiVersion: policies.kyverno.io/v1
      kind: ValidatingPolicy
      current: status.conditionStatus.ready == true
