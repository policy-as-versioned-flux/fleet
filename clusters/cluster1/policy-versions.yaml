# The crux (PRD §6.4, ADR-0005): one ResourceSet input carrying one nested
# {version, tag, commit, policies} array. Adding/removing an element is the
# only change needed to install/retire a version -- everything else
# (GitRepository + per-policy Kustomizations, all collision-free via
# nameSuffix) renders from it.
#
# `version` (the policy-version workloads must label with -- what's actually
# baked into that release's kustomize nameSuffix/objectSelector) and `tag`
# (the git ref to fetch) are separate fields, not one string, because two of
# these three releases are CI-only-fix patches (v1.0.1 fixes the release
# workflow itself, v2.0.1 fixes a signing-config regression) that correctly
# left the policy content -- and so its internal version literal -- exactly
# as it was (v1.0.1's content still declares itself "1.0.0"; CONTEXT.md: a
# release with zero verdict impact is unversioned-in-substance even if it
# needed a new tag to ship a working CI run). v2.1.1 is a real content
# release, so its tag and version happen to be the same string. Consumers
# must label with `version`, not `tag` -- "one semver string, three
# authors" is about the *policy* version string, and diverges from the git
# tag exactly when a release changes nothing a workload's admission verdict
# could observe.
#
# Each element also carries its own `policies` list rather than pointing
# one Kustomization at an aggregating `workloads/kyverno/` path: the policy
# repo has no such aggregating kustomization.yaml (issue 06), and each
# already-tagged version has a *different* policy set (1.0.0/2.0.0 ship 2
# policies, 2.1.1 ships 3) -- ranging over versions alone can't discover
# that without either retrofitting immutable tags or hardcoding a
# lowest-common-denominator list. A future release that adds the
# aggregating kustomization.yaml could drop this inner list.
#
# Also generates the orphan guard (issue 09, CONTEXT.md "Orphan guard"):
# one deterministic catch-all Deny ValidatingPolicy whose CEL allow-list is
# rendered from this SAME inputs.versions array, so it cannot drift from
# the installed set -- adding/removing a version changes both the
# installed policies AND the guard's allow-list in the same reconcile.
# Because every versioned policy (gates included) only matches workloads
# that opt in via the label, the guard is what makes the gate tier a
# locked door rather than an opt-in door.
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: policy-versions
  namespace: flux-system
spec:
  dependsOn:
    - apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      name: kyverno
      namespace: flux-system
      ready: true
  inputs:
    - versions:
        # issue 08: all three now point at the matchConditions-fixed tags
        # (v1.0.3/v2.0.3/v2.2.0) -- zero verdict impact, mechanism-only patch
        # for the two older lines; v2.2.0 is a real content release (also
        # ships the cloud plane, not yet wired in here -- see issue 19).
        #
        # v1.0.2/v2.0.2 (skipped, not v1.0.3/v2.0.3 by coincidence): Flux's
        # go-git failed to resolve their commits during shallow-fetch-by-tag
        # ("unable to resolve commit object ... object not found") even
        # though `git clone --branch` resolved the identical tag fine.
        # Root-caused live, confirmed by direct test (deleted the fix,
        # watched it break again, restored it, watched it recover): go-git's
        # shallow-fetch-by-tag needs the commit reachable from a branch under
        # refs/heads, not just the tag itself -- a documented Flux/go-git
        # limitation (fluxcd/source-controller#1166), not specific to these
        # tags. v1.0.2/v2.0.2's commits, made via `git worktree` from an
        # older tag's detached HEAD, were never on any branch. Fixed two
        # ways at once: v1.0.3/v2.0.3 carry the same content with a fresh
        # unsigned commit (the SSH-signed original was a secondary, now-moot
        # difference) AND a permanent branch ref
        # (policy repo: release-pins/v1.0.3, release-pins/v2.0.3) keeps each
        # commit branch-reachable for Flux's benefit -- deleting either
        # branch breaks resolution again, confirmed live, so they are
        # load-bearing infrastructure, not cleanup candidates. Tags
        # themselves are still fully gitsign-signed. Same
        # immutable-tag-stays pattern as v1.0.0/v2.0.0.
        # issue 19: `policies` items are now {name, plane} objects, not bare
        # strings -- plane picks the fetch path (workloads/kyverno/<name> vs
        # cloud/<name>) and, for cloud, adds dependsOn: crossplane-providers
        # (issue 18's CRDs-Established gate) on top of the usual dependsOn:
        # kyverno. Only v2.2.0 ships cloud policies today; a version with no
        # cloud content just omits them, same as any other policy.
        # ticket 09 (real-estate): `sunset` is this FLEET's adoption
        # decision, not a property of the release (ADR-0010) -- purely
        # data for tooling (governance-agent's sunset-escalator, the
        # estate dashboard's countdown) to read; the ResourceSet template
        # never references it, so it changes nothing about what installs.
        # 1.0.0 is the laggard the roster was designed to expose; giving
        # it a real sunset horizon is the honest version of "we know,
        # we're on it" rather than leaving it open-ended forever.
        - version: "1.0.0"
          tag: "1.0.3"
          commit: "66730c2415791135ef90b43cf9868e7a26043d08"
          sunset: "2026-08-15"
          policies:
            - name: require-department-label
              plane: workload
            - name: require-known-department-label
              plane: workload
        - version: "2.0.0"
          tag: "2.0.3"
          commit: "1c2a3728aa885d07d440d2ac5da981adbb40732c"
          policies:
            - name: require-department-label
              plane: workload
            - name: require-known-department-label
              plane: workload
        - version: "2.2.0"
          tag: "2.2.0"
          commit: "6ad22ca85a444b289493725b178666f2156c8b32"
          policies:
            - name: require-department-label
              plane: workload
            - name: require-known-department-label
              plane: workload
            - name: require-owner-annotation
              plane: workload
            - name: require-s3-bucket-encryption
              plane: cloud
            - name: require-rds-multi-az
              plane: cloud
        # THROWAWAY, ticket 09 real-retirement proof: an adversarial audit
        # found "merging retires the version" was only ever simulated
        # (PR#31 closed unmerged) -- never actually tested against a real
        # merge, because clusters/cluster1/policy-versions.yaml wasn't
        # Flux-reconciled at the time (fixed just above, this same epic
        # follow-up). This element will be removed by a second real merged
        # PR to prove Flux retires it with zero manual kubectl steps.
        - version: "2.1.1"
          tag: "2.1.1"
          commit: "95579dd567b2c0e490ce56aeb0504290085651f6"
          policies:
            - name: require-department-label
              plane: workload
            - name: require-known-department-label
              plane: workload
            - name: require-owner-annotation
              plane: workload
  resourcesTemplate: |
    << range $v := inputs.versions >>
    ---
    apiVersion: source.toolkit.fluxcd.io/v1
    kind: GitRepository
    metadata:
      name: policy-<< $v.version >>
      namespace: flux-system
    spec:
      interval: 1m0s
      url: https://github.com/policy-as-versioned-flux/policy
      ref:
        tag: v<< $v.tag >>
        commit: << $v.commit >>
    << range $p := $v.policies >>
    ---
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: policy-<< $v.version >>-<< $p.name >>
      namespace: flux-system
    spec:
      interval: 1m0s
      sourceRef:
        kind: GitRepository
        name: policy-<< $v.version >>
    << if eq $p.plane "cloud" >>
      path: ./cloud/<< $p.name >>
    << else >>
      path: ./workloads/kyverno/<< $p.name >>
    << end >>
      prune: true
      wait: true
      timeout: 3m0s
    << if eq $p.plane "cloud" >>
      dependsOn:
        - name: kyverno
        - name: crossplane-providers
    << else >>
      dependsOn:
        - name: kyverno
    << end >>
      healthCheckExprs:
        - apiVersion: policies.kyverno.io/v1
          kind: ValidatingPolicy
          current: status.conditionStatus.ready == true
    << end >>
    << end >>
    ---
    # Orphan guard. Deny, not Audit: this is a fresh cluster, not a
    # brownfield estate with a pre-existing unlabelled fleet to avoid
    # disrupting -- CONTEXT.md/ADR-0006 note a brownfield estate may start
    # this in Audit and promote by editorial PR (never timed/automatic),
    # which is a real deployment option this comment documents but doesn't
    # need here. Excludes cluster-system namespaces: an unconstrained
    # catch-all on all Pods would deny Kyverno's/Flux's/kube-system's own
    # pod rollouts, none of which carry (or should need) a
    # mycompany.com/policy-version label.
    apiVersion: policies.kyverno.io/v1
    kind: ValidatingPolicy
    metadata:
      name: orphan-guard
      annotations:
        policies.kyverno.io/title: Orphan guard
        policies.kyverno.io/subject: Pod
        policies.kyverno.io/description: >-
          Deny-at-admission catch-all: every Pod outside the cluster-system
          namespaces must carry a mycompany.com/policy-version label whose
          value is one of the versions currently installed on this cluster.
          A missing label is a violation; an unknown/retired one is a
          violation. The allow-list is templated from the same
          ResourceSet input that installs the versions (this file), so it
          cannot drift from the installed set.
    spec:
      validationActions:
        - Deny
      matchConstraints:
        resourceRules:
          - apiGroups: [""]
            apiVersions: ["v1"]
            operations: ["CREATE", "UPDATE"]
            resources: ["pods"]
        namespaceSelector:
          matchExpressions:
            - key: kubernetes.io/metadata.name
              operator: NotIn
              values:
                - kube-system
                - kube-public
                - kube-node-lease
                - kyverno
                - flux-system
                - local-path-storage
                # issue 18/issue 08 live verification: discovered live --
                # crossplane's own control-plane Deployments (crossplane,
                # crossplane-rbac-manager) were denied at admission by this
                # exact guard (no mycompany.com/policy-version label,
                # correctly so per the guard's own rule -- they're
                # infrastructure, not app workloads). monitoring's pods
                # predate this guard reliably enforcing at all (issue 08's
                # webhook-flattening bug meant it wasn't consistently active
                # until the matchConditions fix landed cluster-wide), so
                # they slipped through unnoticed -- excluded explicitly now
                # rather than relying on that.
                - crossplane-system
                - monitoring
      validations:
        - expression: >-
            has(object.metadata.labels) &&
            'mycompany.com/policy-version' in object.metadata.labels &&
            object.metadata.labels['mycompany.com/policy-version'] in [<< range $i, $v := inputs.versions >><< if $i >>, << end >>'<< $v.version >>'<< end >>]
          message: "Pods must carry a mycompany.com/policy-version label matching a currently-installed version."
