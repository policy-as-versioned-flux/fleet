# Consumer apps (app1/2/3, pinned to 1.0.1/2.0.1/2.1.1 respectively) --
# ordinary continuous GitOps sync, branch-tracked, not itself the versioned
# dependency (that's policy-versions.yaml's ResourceSet). No dependsOn on
# the per-version policy Kustomizations here: those names are generated by
# the ResourceSet, one set per array element, and hardcoding today's names
# here would mean editing *two* files to add/remove a version -- exactly
# what the ResourceSet is meant to make a one-file change (issue 08's
# checklist). Ordering is eventual, not synchronous: an app applied before
# its judge exists just gets judged on the engine's next pass.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 1m0s
  url: https://github.com/policy-as-versioned-flux/apps
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 1m0s
  sourceRef:
    kind: GitRepository
    name: apps
  path: ./
  prune: true
  wait: true
  timeout: 2m0s
