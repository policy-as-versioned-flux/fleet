# Ticket 07/08 (real-estate): five real team repos replace the old apps
# monorepo (app1/2/3, three identical nginx pods in one repo) -- one
# GitRepository+Kustomization pair per team, each team's own reconcile
# cadence, own tags, own dependency tree. No dependsOn on the per-version
# policy Kustomizations here: those names are generated by the
# ResourceSet, one set per array element, and hardcoding today's names
# here would mean editing *two* files to add/remove a version. Ordering is
# eventual, not synchronous: an app applied before its judge exists just
# gets judged on the engine's next pass.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: storefront
  namespace: flux-system
spec:
  interval: 1m0s
  url: https://github.com/policy-as-versioned-flux/storefront
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: storefront
  namespace: flux-system
spec:
  interval: 1m0s
  sourceRef:
    kind: GitRepository
    name: storefront
  path: ./k8s
  prune: true
  wait: true
  timeout: 2m0s
---
