# datastore carries no container image -- its "workload" is the Crossplane
# claims at its repo root (see that repo's README). dependsOn the
# crossplane-providers Kustomization already in this fleet, same
# ordering constraint the old cloud-exemplars.yaml relied on implicitly
# via the c2p Kustomization's own dependsOn.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: datastore
  namespace: flux-system
spec:
  interval: 1m0s
  url: https://github.com/policy-as-versioned-flux/datastore
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: datastore
  namespace: flux-system
spec:
  interval: 1m0s
  sourceRef:
    kind: GitRepository
    name: datastore
  path: ./
  prune: true
  wait: true
  timeout: 2m0s
  dependsOn:
    - name: crossplane-providers
