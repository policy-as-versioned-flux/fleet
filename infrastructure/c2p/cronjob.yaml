# Issue 21 / ADR-0009; extracted per ticket 03-real-estate: this CronJob now
# pins policy-as-versioned-flux/c2p-collector by digest (own repo, own
# built image -- c2pcli/kyverno-plugin/kubectl baked in at release time,
# not built from source on every 15-minute run). Run time drops from
# ~4 minutes (git clone + go build cold) to seconds-to-start.
#
# Single container, root: the image's own binaries need no package install
# at run time any more, but the job still only touches its own ephemeral
# container filesystem (no host access, no privileged mode) -- capped:
# no privilege-escalation, no added capabilities.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: c2p-collector
  namespace: monitoring
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: c2p-collector
          restartPolicy: Never
          containers:
            - name: c2p-collector
              image: ghcr.io/policy-as-versioned-flux/c2p-collector@sha256:22fb2782f4812d0ff81b476df8a763eeb9c02e8aa57b49f8402037b2dda33ece # v1.0.1
              env:
                - name: HOME
                  value: /work
                - name: WORK
                  value: /work
                - name: COMPONENT_DEFINITION
                  value: /config/component-definition.json
                - name: NAMESPACE
                  value: monitoring
              volumeMounts:
                - name: config
                  mountPath: /config
                - name: work
                  mountPath: /work
              securityContext:
                allowPrivilegeEscalation: false
                capabilities: {drop: ["ALL"]}
              resources:
                # No more cold `go build` -- the image already carries the
                # binaries. Headroom now only needs to cover result2oscal
                # itself against this cluster's real PolicyReport volume.
                requests: {cpu: 100m, memory: 128Mi}
                limits: {memory: 256Mi}
          volumes:
            - name: config
              configMap:
                name: c2p-component-definition
            - name: work
              emptyDir: {}
