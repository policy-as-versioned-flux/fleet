# Ticket 10 (real-estate): the CIO's forward question, answered on a
# schedule -- "would the estate pass 2.2.0 [the leading version] today?"
# Offline by construction (see the component's own README): kyverno apply
# against a local workload dump, never kubectl apply. Zero effect on
# admission or live PolicyReports.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: readiness-collector
  namespace: monitoring
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: readiness-collector
          restartPolicy: Never
          containers:
            - name: readiness-collector
              image: ghcr.io/policy-as-versioned-flux/readiness-collector@sha256:e25c7abfa6143df59f3bb16a755c4927aad3ac3781ddf5bf8d4ead1a95a4dbbe # v1.0.0
              env:
                - name: HOME
                  value: /work
                - name: WORK
                  value: /work
                - name: CANDIDATE_TAG
                  value: "2.2.0"
                - name: NAMESPACE
                  value: monitoring
              volumeMounts:
                - name: work
                  mountPath: /work
              securityContext:
                allowPrivilegeEscalation: false
                capabilities: {drop: ["ALL"]}
              resources:
                requests: {cpu: 100m, memory: 128Mi}
                limits: {memory: 512Mi}
          volumes:
            - name: work
              emptyDir: {}
