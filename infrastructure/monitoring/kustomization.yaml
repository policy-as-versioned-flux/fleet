apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - helmrepository.yaml
  - kube-prometheus-stack-helmrelease.yaml
  - policy-reporter-helmrelease.yaml
  - trivy-operator-helmrelease.yaml
# Issue 15: the combined Flux-revision + PolicyReports dashboard, as a
# ConfigMap labelled for kube-prometheus-stack's Grafana sidecar to
# auto-discover -- same mechanism Policy Reporter's own dashboards use
# (policy-reporter-helmrelease.yaml), not a separate bespoke import step.
configMapGenerator:
  - name: flux-policy-dashboard
    namespace: monitoring
    files:
      - dashboards/flux-policy-dashboard.json
    options:
      labels:
        grafana_dashboard: "1"
  # Ticket 12 (real-estate): second dashboard, same ConfigMap/sidecar
  # mechanism -- the CIO dashboard above stays one-question-shaped and
  # untouched beyond ticket 01's additions.
  - name: estate-staleness-dashboard
    namespace: monitoring
    files:
      - dashboards/estate-staleness-dashboard.json
    options:
      labels:
        grafana_dashboard: "1"
generatorOptions:
  disableNameSuffixHash: true
