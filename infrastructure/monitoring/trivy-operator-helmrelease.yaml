# Ticket 11 (real-estate): dependency-vulnerability staleness signal for
# the estate's real apps (ledger's Log4Shell-era log4j, storefront's old
# Angular/npm tree) -- the second kind of staleness the estate dashboard
# (ticket 12) joins alongside policy-version staleness. Native
# `trivy_image_vulnerabilities` Prometheus metric, ServiceMonitor built
# into the chart -- no bespoke exporter.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trivy-operator
  namespace: monitoring
spec:
  interval: 1h
  releaseName: trivy-operator
  chart:
    spec:
      chart: trivy-operator
      version: "0.34.0"
      sourceRef:
        kind: HelmRepository
        name: aqua-trivy
        namespace: monitoring
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    resources:
      requests: {cpu: 100m, memory: 100Mi}
      limits: {memory: 500Mi}
    trivy:
      # Ephemeral-demo posture, same rationale as Prometheus's empty
      # storageSpec (faithful-floor issue 14) -- KiND is free & reproducible,
      # nothing here needs to survive a ./down.sh.
      storageClassEnabled: false
    serviceMonitor:
      enabled: true
      # kube-prometheus-stack's Prometheus CR only selects ServiceMonitors
      # carrying this label by default -- the same release-label selector
      # gotcha policy-reporter-helmrelease.yaml already documents.
      labels:
        release: kube-prometheus-stack
