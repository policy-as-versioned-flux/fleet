# Ticket 11 (real-estate): dependency-vulnerability staleness signal for
# the estate's real apps (ledger's Log4Shell-era log4j, storefront's old
# Angular/npm tree) -- the second kind of staleness the estate dashboard
# (ticket 12) joins alongside policy-version staleness. Native
# `trivy_image_vulnerabilities` Prometheus metric, ServiceMonitor built
# into the chart -- no bespoke exporter.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trivy-operator
  namespace: monitoring
spec:
  interval: 1h
  releaseName: trivy-operator
  chart:
    spec:
      chart: trivy-operator
      version: "0.34.0"
      sourceRef:
        kind: HelmRepository
        name: aqua-trivy
        namespace: monitoring
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    resources:
      requests: {cpu: 100m, memory: 100Mi}
      limits: {memory: 500Mi}
    # KiND is a single node -- the chart default (10 concurrent scan jobs)
    # schedules them all onto that one node. Serializing to 1 alone did NOT
    # resolve it: "cache may be in use by another process: timeout" kept
    # recurring even one-at-a-time, confirmed live across many separate
    # scan attempts over 24h+. Root cause: Standalone mode has every scan
    # job independently download + lock its own vulnerability-DB copy in
    # its own emptyDir -- concurrency-limiting the *jobs* doesn't fix a
    # *DB-download/lock* race inherent to each job's own trivy CLI
    # invocation. The structural fix is ClientServer mode (below), not
    # more serialization.
    operator:
      scanJobsConcurrentLimit: 1
      # builtInTrivyServer sets trivy.mode=ClientServer and trivy.serverURL
      # for us -- setting trivy.mode by hand without serverURL fails the
      # Helm template outright ("trivy.serverURL is required"), found live.
      builtInTrivyServer: true
    trivy:
      # Ephemeral-demo posture, same rationale as Prometheus's empty
      # storageSpec (faithful-floor issue 14) -- KiND is free & reproducible,
      # nothing here needs to survive a ./down.sh. Applies to the
      # trivy-server's own DB storage in ClientServer mode.
      storageClassEnabled: false
      # Chart default (500Mi limit) OOMKilled scanning ledger's shaded jar
      # (DB download + Java jar analysis together) -- confirmed live via
      # the operator's own reconciler logs (status.reason: OOMKilled).
      # Same headroom-for-real-work lesson as the c2p-collector's own
      # 512Mi->1536Mi fix (issue 21, faithful-floor).
      resources:
        requests: {cpu: 100m, memory: 100Mi}
        limits: {cpu: 1, memory: 1Gi}
    serviceMonitor:
      enabled: true
      # kube-prometheus-stack's Prometheus CR only selects ServiceMonitors
      # carrying this label by default -- the same release-label selector
      # gotcha policy-reporter-helmrelease.yaml already documents.
      labels:
        release: kube-prometheus-stack
